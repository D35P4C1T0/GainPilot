name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config lv2-dev libgtk-3-dev
      - name: Fetch VST3 SDK
        run: git clone --depth 1 --recurse-submodules https://github.com/steinbergmedia/vst3sdk external/vst3sdk
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Stage install tree
        run: |
          cmake --install build --prefix "$PWD/stage"
      - name: Generate packages
        run: cpack --config build/CPackConfig.cmake
      - uses: actions/upload-artifact@v6
        with:
          name: gainpilot-linux-packages
          path: build/packages/*
      - uses: actions/upload-artifact@v6
        with:
          name: gainpilot-linux-stage
          path: stage/*

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fetch VST3 SDK
        run: git clone --depth 1 --recurse-submodules https://github.com/steinbergmedia/vst3sdk external/vst3sdk
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGAINPILOT_ENABLE_LV2=OFF
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Stage install tree
        run: |
          cmake --install build --prefix "$PWD/stage"
      - name: Generate packages
        run: cpack --config build/CPackConfig.cmake
      - uses: actions/upload-artifact@v6
        with:
          name: gainpilot-macos-packages
          path: build/packages/*
      - uses: actions/upload-artifact@v6
        with:
          name: gainpilot-macos-stage
          path: stage/*

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - name: Install packaging toolchains
        shell: pwsh
        run: |
          choco install nsis wixtoolset --no-progress -y
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          if (Test-Path $nsisPath) {
            $nsisPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          $wixDir = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory | Where-Object { $_.Name -like 'WiX Toolset*' } | Select-Object -First 1
          if ($null -ne $wixDir) {
            Join-Path $wixDir.FullName "bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
      - name: Fetch VST3 SDK
        run: git clone --depth 1 --recurse-submodules https://github.com/steinbergmedia/vst3sdk external/vst3sdk
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGAINPILOT_ENABLE_LV2=OFF
      - name: Build
        run: cmake --build build --config Release
      - name: Stage install tree
        shell: pwsh
        run: |
          cmake --install build --prefix "$PWD/stage"
      - name: Generate packages
        shell: pwsh
        run: cpack --config build/CPackConfig.cmake
      - uses: actions/upload-artifact@v6
        with:
          name: gainpilot-windows-packages
          path: build/packages/*
      - uses: actions/upload-artifact@v6
        with:
          name: gainpilot-windows-stage
          path: stage/*
